<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工器具点検アプリ (Tool/Equipment Inspection App)</title>
    
    <!-- PWA / iPad用設定 -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="工具点検">
    <!-- 仮のアイコン設定（後で独自の画像に差し替え可能） -->
    <link rel="apple-touch-icon" href="https://cdn.pixabay.com/photo/2016/03/31/14/37/check-mark-1292787_1280.png">

    <!-- 優れたデザインのためのGoogle Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- アイコン用 (Phosphor Icons - モダンで洗練されたアイコン) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- サイドナビゲーション -->
        <aside class="sidebar">
            <div class="brand">
                <i class="ph-fill ph-check-circle brand-icon"></i>
                <h1>工器具点検</h1>
            </div>
            
            <nav class="nav-menu">
                <a href="#dashboard" class="nav-item active" data-view="dashboard">
                    <i class="ph ph-squares-four"></i>
                    <span>ホーム</span>
                </a>
                <a href="#inspection" class="nav-item" data-view="inspection">
                    <i class="ph ph-clipboard-text"></i>
                    <span>月次点検</span>
                </a>
                <a href="#inventory" class="nav-item" data-view="inventory">
                    <i class="ph ph-package"></i>
                    <span>工具マスター管理</span>
                </a>
                <a href="#reports" class="nav-item" data-view="reports">
                    <i class="ph ph-file-pdf"></i>
                    <span>履歴・出力</span>
                </a>
                <a href="#settings" class="nav-item" data-view="settings">
                    <i class="ph ph-gear"></i>
                    <span>設定・連携</span>
                </a>
            </nav>
        </aside>

        <!-- メインコンテンツ領域 -->
        <main class="main-content">
            <header class="topbar">
                <button id="sidebar-toggle" class="btn-icon mobile-only">
                    <i class="ph ph-list"></i>
                </button>
                <h2 id="view-title">ホーム</h2>
                <div class="user-info">
                    <div class="avatar"><i class="ph ph-user"></i></div>
                    <span class="user-name">管理者</span>
                </div>
            </header>
            
            <div id="view-container" class="view-container">
                <!-- 初期読み込み中メッセージ -->
                <div id="app-loading" style="padding: 40px; text-align: center; color: var(--text-muted);">
                    <i class="ph ph-spinner ph-spin" style="font-size: 32px; margin-bottom: 12px;"></i>
                    <p>アプリケーションを読み込み中...</p>
                    <p style="font-size: 12px; margin-top: 8px;">しばらく待っても表示されない場合は、GitHubへのファイルアップロード状況を確認してください。</p>
                </div>
                <!-- ここに各画面のコンテンツが動的に挿入されます -->
            </div>
        </main>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- コンポーネント用のテンプレート -->
    <template id="tmpl-dashboard">
        <div class="dashboard-view">
            <!-- 歓迎セクション / モチベーション向上 -->
            <div class="card" style="background: linear-gradient(135deg, var(--secondary-color), #1e293b); color: white; border: none; margin-bottom: 40px;">
                <div class="card-body" style="padding: 40px; display: flex; align-items: center; justify-content: space-between;">
                    <div>
                        <h2 style="font-size: 28px; margin-bottom: 8px;">今日も安全に、確実な点検を。</h2>
                        <p style="color: #94a3b8; font-size: 16px;">定期的な工器具点検は、事故を防ぎ、作業の質を高めます。</p>
                    </div>
                    <div style="font-size: 60px; color: var(--primary-color); opacity: 0.8;">
                        <i class="ph ph-shield-check"></i>
                    </div>
                </div>
            </div>

            <div class="stats-cards">
                <div class="card stat-card">
                    <div class="stat-icon orange"><i class="ph ph-warning-circle"></i></div>
                    <div class="stat-info">
                        <h3>補充が必要</h3>
                        <p class="stat-number" id="dash-low-stock">0</p>
                    </div>
                </div>
                <div class="card stat-card">
                    <div class="stat-icon blue"><i class="ph ph-hand-coins"></i></div>
                    <div class="stat-info">
                        <h3>貸出・校正中</h3>
                        <p class="stat-number" id="dash-maintenance">0</p>
                    </div>
                </div>
                <div class="card stat-card">
                    <div class="stat-icon green"><i class="ph ph-monitor"></i></div>
                    <div class="stat-info">
                        <h3>登録工具数</h3>
                        <p class="stat-number" id="dash-total-items">0</p>
                    </div>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="card">
                    <div class="card-header">
                        <h3><i class="ph ph-bell"></i> アラート・通知</h3>
                    </div>
                    <div class="card-body">
                        <ul id="alert-list" class="alert-list" style="list-style: none;">
                            <!-- アラート項目がここに入ります -->
                        </ul>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3><i class="ph ph-clock-counter-clockwise"></i> 最近の持ち出し・校正</h3>
                    </div>
                    <div class="card-body">
                        <ul id="maintenance-list" class="maintenance-list" style="list-style: none;">
                            <!-- 校正中・貸出中リストがここに入ります -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="tmpl-inventory">
        <div class="inventory-view">
            <div class="view-header-actions">
                <button class="btn btn-primary" id="btn-add-item">
                    <i class="ph ph-plus"></i> 新規工具を追加
                </button>
            </div>
            
            <div class="card">
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>写真</th>
                                <th>工具・器具名</th>
                                <th>配置場所</th>
                                <th>種類</th>
                                <th>規定数</th>
                                <th>状態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-tbody">
                            <!-- 工具データが挿入されます -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

    <template id="tmpl-inspection">
        <div class="inspection-view">
            <div class="card" id="inspection-start-card">
                <div class="card-body text-center">
                    <h2 style="margin-bottom: 16px; color: var(--secondary-color);">点検を開始</h2>
                    <p class="text-muted" style="margin-bottom: 32px;">今月の点検作業を開始しましょう。正確なデータ記録をお願いします。</p>
                    <div class="input-group" style="max-width: 400px; margin: 0 auto 32px auto; text-align: left;">
                        <label style="font-weight: 600; display: block; margin-bottom: 8px;">点検実施者名</label>
                        <input type="text" id="inspector-name" class="form-control" placeholder="例: 作業 太郎">
                    </div>
                    <button class="btn btn-primary btn-lg" id="btn-start-inspection" style="width: 100%; max-width: 400px;">
                        <i class="ph ph-play-circle" style="font-size: 24px;"></i> 点検を開始する
                    </button>
                </div>
            </div>

            <div id="inspection-form-container" style="display: none;">
                <div class="card">
                     <div class="card-header">
                         <h3 id="current-inspection-date">20xx年xx月の点検</h3>
                     </div>
                     <div class="table-responsive">
                         <table class="data-table">
                             <thead>
                                 <tr>
                                     <th>工具情報</th>
                                     <th>規定数</th>
                                     <th>点検数</th>
                                     <th>塗色確認</th>
                                     <th>状態更新</th>
                                 </tr>
                             </thead>
                             <tbody id="inspection-tbody">
                                 <!-- 点検項目 -->
                             </tbody>
                         </table>
                     </div>
                     <div class="card-footer" style="padding: 40px; text-align: center;">
                         <button class="btn btn-primary btn-lg" id="btn-submit-inspection" style="min-width: 300px;">
                             <i class="ph ph-check-circle" style="font-size: 24px;"></i> 点検データを送信・保存
                         </button>
                     </div>
                </div>
            </div>
        </div>
    </template>

    <template id="tmpl-reports">
        <div class="reports-view">
            <div class="card">
                <div class="card-header">
                    <h3>過去の点検履歴</h3>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>点検年月</th>
                                <th>実施者</th>
                                <th>アイテム数</th>
                                <th>状態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="reports-tbody">
                            <!-- 履歴データが挿入されます -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

    <template id="tmpl-settings">
        <div class="settings-view">
            <div class="dashboard-grid">
                <!-- メール・通知連携 -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="ph ph-envelope-simple"></i> 通知・メール設定</h3>
                    </div>
                    <div class="card-body">
                        <form id="settings-email-form">
                            <div class="form-group">
                                <label for="setting-supervisor-email">助役のメールアドレス</label>
                                <input type="email" id="setting-supervisor-email" class="form-control" placeholder="example@company.com">
                                <small class="form-text">点検完了時に報告メールを送る際のデフォルト送信先になります。</small>
                            </div>
                            <button type="submit" class="btn btn-primary">保存する</button>
                            <span id="email-save-msg" style="margin-left: 12px; color: var(--success-color); display: none;">保存しました！</span>
                        </form>
                    </div>
                </div>

                <!-- Power Automate連携 -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="ph ph-plugs-connected"></i> 外部連携 (Webhook)</h3>
                    </div>
                    <div class="card-body">
                        <p class="text-muted" style="margin-bottom: 16px; font-size: 14px;">
                            SharePointやExcel等にデータを自動送信する場合のURLを設定します。
                        </p>
                        <form id="settings-webhook-form">
                            <div class="form-group">
                                <label for="setting-webhook-url">HTTP Webhook URL</label>
                                <input type="url" id="setting-webhook-url" class="form-control" placeholder="https://prod-...">
                            </div>
                            <button type="submit" class="btn btn-primary">保存する</button>
                            <span id="webhook-save-msg" style="margin-left: 12px; color: var(--success-color); display: none;">保存しました！</span>
                        </form>
                    </div>
                </div>

                <!-- バックアップ・復旧 -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="ph ph-database"></i> データの管理</h3>
                    </div>
                    <div class="card-body">
                        <div style="margin-bottom: 24px;">
                            <button class="btn btn-secondary" id="btn-export-data" style="width: 100%;">
                                <i class="ph ph-download-simple"></i> バックアップを保存
                            </button>
                        </div>
                        <hr style="border:none; border-top:1px solid var(--border-color); margin-bottom: 24px;">
                        <div style="display: flex; flex-direction: column; gap: 12px;">
                            <label style="font-size: 14px; font-weight: 600;">バックアップの読込</label>
                            <input type="file" id="file-import-data" accept=".json" class="form-control" style="padding: 6px;">
                            <button class="btn btn-secondary" id="btn-import-data">
                                <i class="ph ph-upload-simple"></i> データ復元
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- モーダル・ダイアログ (例: アイテム追加/編集) -->
    <div id="item-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">新規工具の追加</h3>
                <button class="modal-close"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <form id="item-form">
                    <input type="hidden" id="item-id">
                    
                    <!-- 画像アップロード -->
                    <div class="image-upload-area">
                        <label>工具の写真</label>
                        <input type="file" id="item-image-input" accept="image/*" style="display: none;">
                        <input type="hidden" id="item-image-base64">
                        <div class="image-preview-box" id="image-preview-box" onclick="document.getElementById('item-image-input').click()">
                            <div class="upload-prompt" id="upload-prompt">
                                <i class="ph ph-camera"></i>
                                <span>タップして写真を選択</span>
                            </div>
                            <img id="image-preview" style="display: none;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="item-name">工具・器具名</label>
                        <input type="text" id="item-name" class="form-control" placeholder="例: トルクレンチ 100Nm" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="item-type">管理方法</label>
                        <select id="item-type" class="form-control">
                            <option value="equipment">1点管理（器具や計測器）</option>
                            <option value="consumable">複数管理（消耗品など）</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="item-location">配置場所 (A～G)</label>
                        <select id="item-location" class="form-control">
                            <option value="A">エリアA (ラック1)</option>
                            <option value="B">エリアB (ラック2)</option>
                            <option value="C">エリアC (棚)</option>
                            <option value="D">エリアD</option>
                            <option value="E">エリアE</option>
                            <option value="F">エリアF</option>
                            <option value="G">エリアG</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="item-required-qty">規定数</label>
                        <input type="number" id="item-required-qty" class="form-control" value="1" min="1" required>
                    </div>

                    <div class="form-group">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="item-paint">
                            <label for="item-paint">塗色確認が必要な工具</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="item-status">現在の状態</label>
                        <select id="item-status" class="form-control">
                            <option value="normal">通常（倉庫内）</option>
                            <option value="borrowed">貸出中</option>
                            <option value="calibration">校正中</option>
                        </select>
                    </div>
                    
                    <div class="form-group" id="calibration-date-group" style="display: none;">
                        <label for="item-calibration-date">次回校正予定日</label>
                        <input type="date" id="item-calibration-date" class="form-control">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="btn-cancel-modal">キャンセル</button>
                <button type="submit" form="item-form" class="btn btn-primary">工具情報を保存</button>
            </div>
        </div>
    </div>

    <!-- 自己診断用スクリプト（JSのエラーを画面に表示） -->
    <script>
        // 1. スクリプトの読み込みエラーを早期に検知するためのフック
        window.onerror = function(msg, url, line, col, error) {
            const container = document.getElementById('view-container');
            if (container) {
                container.innerHTML = `
                    <div style="padding:24px; background:#fff1f2; border:2px solid #fda4af; border-radius:12px; color:#9f1239; margin:20px; font-family:sans-serif;">
                        <h3 style="margin-top:0;"><i class="ph ph-warning-circle"></i> 起動時にエラーが発生しました</h3>
                        <p style="font-weight:bold; margin:8px 0;">内容: ${msg}</p>
                        <p style="font-size:12px; color:#be123c;">場所: ${url} (L:${line})</p>
                        <div style="margin-top:16px; font-size:13px; color:#4c0519; background:rgba(255,255,255,0.5); padding:10px; border-radius:6px;">
                            <strong>ヒント:</strong> GitHubに <code>js</code> フォルダとファイルが全てアップロードされているか確認し、ファイル名の大文字・小文字が合っているか確認してください。
                        </div>
                        <button onclick="location.reload()" style="margin-top:16px; padding:8px 16px; background:#9f1239; color:white; border:none; border-radius:6px; cursor:pointer;">再読み込みを試す</button>
                    </div>
                `;
            }
            return false;
        };

        // 2. 特定のファイルが読み込めなかった場合を検知する関数
        function reportScriptError(filename) {
            console.error('Failed to load script:', filename);
            const container = document.getElementById('view-container');
            if (container && !container.innerHTML.includes('ファイルが見つかりません')) {
                container.innerHTML = `
                    <div style="padding:24px; background:#fff1f2; border:2px solid #fda4af; border-radius:12px; color:#9f1239; margin:20px; font-family:sans-serif;">
                        <h3 style="margin-top:0;"><i class="ph ph-warning-circle"></i> ファイルが見つかりません</h3>
                        <p style="font-weight:bold; margin:8px 0;">以下のファイルが読み込めませんでした：<br><code>${filename}</code></p>
                        <p style="font-size:13px; margin-top:12px;">GitHub上のファイル名が大文字・小文字（例: app.js vs App.js）を含め、正しいか確認してください。</p>
                        <button onclick="location.reload()" style="margin-top:16px; padding:8px 16px; background:#9f1239; color:white; border:none; border-radius:6px; cursor:pointer;">再読み込みを試す</button>
                    </div>
                `;
                const loading = document.getElementById('app-loading');
                if (loading) loading.style.display = 'none';
            }
        }
    </script>
    
    <!-- Excel出力用ライブラリ(SheetJS CDN) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js" onerror="reportScriptError('SheetJS')"></script>
    
    <!-- アプリケーションのスクリプト群 -->
    <script src="js/storage.js" onerror="reportScriptError('js/storage.js')"></script>
    <script src="js/dashboard.js" onerror="reportScriptError('js/dashboard.js')"></script>
    <script src="js/inventory.js" onerror="reportScriptError('js/inventory.js')"></script>
    <script src="js/inspection.js" onerror="reportScriptError('js/inspection.js')"></script>
    <script src="js/reports.js" onerror="reportScriptError('js/reports.js')"></script>
    <script src="js/settings.js" onerror="reportScriptError('js/settings.js')"></script>
    <script src="js/app.js" onerror="reportScriptError('js/app.js')"></script>

    <!-- 3. 読み込み完了後の診断チェック -->
    <script>
        setTimeout(() => {
            if (typeof App === 'undefined' || typeof DashboardView === 'undefined') {
                const loading = document.getElementById('app-loading');
                if (loading && loading.style.display !== 'none') {
                    reportScriptError('初期化に失敗しました。スクリプト間の依存関係または読み込み順序に問題がある可能性があります。');
                }
            }
        }, 5000); // 5秒待って起動していなければ警告
    </script>
</body>
</html>
